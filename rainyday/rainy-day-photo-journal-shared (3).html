<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>우리가 발견한 비온 날 (가정 공유)</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Gaegu:wght@400;700&family=Gowun+Batang&display=swap" rel="stylesheet">
<style>
  :root{
    --mist:#EAF0F3;
    --puddle:#4A6FA5;
    --puddle-deep:#31507d;
    --ink:#2D3B4E;
    --umbrella:#FFC857;
    --paper:#FFFFFF;
    --line:#c9d7e0;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    background:
      radial-gradient(circle at 10% 5%, rgba(74,111,165,0.08) 0, transparent 40%),
      radial-gradient(circle at 90% 15%, rgba(255,200,87,0.10) 0, transparent 35%),
      var(--mist);
    font-family:'Gaegu', sans-serif;
    color:var(--ink);
    min-height:100vh;
    padding:28px 16px 80px;
  }
  .sheet{max-width:1000px;margin:0 auto;}

  .status-bar{
    position:sticky; top:0; z-index:20;
    display:flex; align-items:center; justify-content:center; gap:8px;
    font-size:.85rem; color:var(--puddle-deep);
    background:rgba(234,240,243,0.9);
    backdrop-filter:blur(3px);
    padding:6px 10px; border-radius:0 0 12px 12px;
    max-width:320px; margin:0 auto 6px;
  }
  .status-dot{width:9px;height:9px;border-radius:50%;background:#9db3c6;}
  .status-dot.online{background:#4caf50;}
  .status-dot.error{background:#e57373;}

  .banner{
    display:none;
    max-width:560px; margin:0 auto 18px;
    background:#fff3ea; border:2px solid #e0a458;
    color:#7a4e12; font-size:.9rem; line-height:1.5;
    padding:12px 16px; border-radius:12px;
  }

  .header{text-align:center; position:relative; padding:14px 20px 22px;}
  .drops{display:flex; justify-content:center; gap:10px; margin-bottom:6px;}
  .drop{width:10px;height:14px;background:var(--puddle);border-radius:0 60% 60% 60%;transform:rotate(45deg);opacity:.55;animation:fall 2.6s ease-in infinite;}
  .drop:nth-child(2){animation-delay:.5s;background:var(--umbrella);opacity:.7;}
  .drop:nth-child(3){animation-delay:1s;}
  .drop:nth-child(4){animation-delay:1.5s;background:var(--umbrella);opacity:.7;}
  @keyframes fall{0%{transform:translateY(-6px) rotate(45deg);opacity:0;}30%{opacity:.7;}100%{transform:translateY(8px) rotate(45deg);opacity:0;}}

  #mainTitle{
    font-family:'Gaegu', sans-serif;font-weight:700;font-size:2.5rem;
    color:var(--puddle-deep);text-align:center;border:none;background:transparent;
    width:100%;outline:none;padding:4px 8px;
  }
  #mainTitle::placeholder{color:#9db3c6;}
  .puddle-line{width:120px;height:5px;margin:14px auto 0;border-radius:50%;
    background:radial-gradient(ellipse at center, var(--puddle) 0%, transparent 75%);opacity:.5;}

  .toolbar{display:flex;justify-content:center;gap:12px;margin-bottom:26px;flex-wrap:wrap;}
  .btn{font-family:'Gaegu', sans-serif;font-size:1.05rem;font-weight:700;border:none;border-radius:14px;
    padding:11px 22px;cursor:pointer;transition:transform .15s ease, box-shadow .15s ease;box-shadow:0 3px 0 rgba(0,0,0,0.12);}
  .btn:active{transform:translateY(2px);box-shadow:0 1px 0 rgba(0,0,0,0.12);}
  .btn-primary{background:var(--puddle);color:#fff;}
  .btn-accent{background:var(--umbrella);color:var(--ink);}

  .grid{display:grid;grid-template-columns:repeat(3, 1fr);gap:26px;}
  @media (max-width:800px){.grid{grid-template-columns:repeat(2,1fr);}}
  @media (max-width:520px){.grid{grid-template-columns:1fr;}}

  .card{background:var(--paper);border-radius:18px;box-shadow:0 6px 16px rgba(45,59,78,0.10);
    padding:14px 14px 18px;position:relative;display:flex;flex-direction:column;gap:9px;}
  .card::before{content:"";position:absolute;top:-10px;left:50%;transform:translateX(-50%) rotate(-2deg);
    width:64px;height:22px;background:var(--umbrella);opacity:.85;border-radius:3px;}

  .name-input{
    font-family:'Gaegu', sans-serif; font-size:.85rem; color:var(--puddle-deep);
    background:#F2F7FA; border:1.5px solid var(--line); border-radius:10px;
    padding:5px 10px; text-align:center; outline:none; align-self:center;
  }
  .name-input:focus{border-color:var(--puddle);}
  .name-input::placeholder{color:#a9bccb;}

  .photo-slot{width:100%;aspect-ratio:1/1;border-radius:12px;background:var(--mist);
    border:2.5px dashed var(--line);display:flex;align-items:center;justify-content:center;
    text-align:center;color:var(--puddle);font-size:.95rem;cursor:pointer;overflow:hidden;position:relative;}
  .photo-slot img{width:100%;height:100%;object-fit:cover;display:block;}
  .photo-slot .hint{padding:10px;line-height:1.5;}
  .photo-slot .hint .icon{font-size:1.8rem;display:block;margin-bottom:4px;}
  .photo-slot .replace-badge{position:absolute;bottom:6px;right:6px;background:rgba(45,59,78,0.65);
    color:#fff;font-size:.72rem;padding:3px 8px;border-radius:10px;opacity:0;transition:opacity .15s ease;}
  .photo-slot:hover .replace-badge{opacity:1;}

  .cap-input{font-family:'Gaegu', sans-serif;font-weight:700;font-size:1.05rem;text-align:center;
    color:var(--ink);border:none;border-bottom:2px solid var(--line);background:transparent;
    padding:4px 2px;outline:none;}
  .cap-input:focus{border-bottom-color:var(--puddle);}
  .cap-input::placeholder{color:#aebfcc;}

  .bubble-wrap{position:relative;margin-top:2px;}
  .bubble{background:#F2F7FA;border:2px solid var(--puddle);border-radius:16px;padding:10px 12px 12px;
    font-family:'Gowun Batang', serif;font-size:.92rem;color:var(--puddle-deep);resize:none;width:100%;
    min-height:64px;outline:none;line-height:1.5;overflow-y:hidden;}
  .bubble::placeholder{color:#8fa8bd;font-family:'Gaegu',sans-serif;}
  .bubble-wrap::after{content:"";position:absolute;left:26px;bottom:-9px;width:16px;height:16px;background:#F2F7FA;
    border-right:2px solid var(--puddle);border-bottom:2px solid var(--puddle);transform:rotate(45deg);border-radius:0 0 4px 0;}

  .remove-btn{position:absolute;top:-8px;right:-8px;width:26px;height:26px;border-radius:50%;background:#e57373;
    color:#fff;border:2px solid #fff;font-size:.85rem;font-weight:700;cursor:pointer;display:flex;
    align-items:center;justify-content:center;box-shadow:0 2px 6px rgba(0,0,0,0.15);}

  .add-card{border:2.5px dashed var(--puddle);border-radius:18px;display:flex;align-items:center;justify-content:center;
    min-height:220px;color:var(--puddle);font-size:1.1rem;font-weight:700;cursor:pointer;background:rgba(74,111,165,0.04);}
  .add-card:hover{background:rgba(74,111,165,0.09);}
  .add-card .icon{font-size:2rem;display:block;margin-bottom:6px;text-align:center;}

  footer.note{text-align:center;margin-top:34px;color:#8296a8;font-size:.85rem;}

  @media print{
    .status-bar,.toolbar,.add-card,.remove-btn,.replace-badge,.banner{display:none !important;}
    .drops{display:none;}
    body{padding:0;background:#fff;}
    .card{box-shadow:none;border:1px solid #ddd;break-inside:avoid;}
    #mainTitle{color:#000;}
  }
</style>
</head>
<body>

<div class="status-bar">
  <span class="status-dot" id="statusDot"></span>
  <span id="statusText">연결 중...</span>
</div>

<div class="sheet">
  <div class="banner" id="banner"></div>

  <div class="header">
    <div class="drops"><div class="drop"></div><div class="drop"></div><div class="drop"></div><div class="drop"></div></div>
    <input id="mainTitle" placeholder="제목을 입력하세요">
    <div class="puddle-line"></div>
  </div>

  <div class="toolbar">
    <button class="btn btn-primary" onclick="addCard()">＋ 사진 추가</button>
    <button class="btn btn-accent" onclick="window.print()">🖨️ 인쇄하기</button>
  </div>

  <div class="grid" id="grid"></div>
</div>

<footer class="note">사진을 올리면 가정과 실시간으로 함께 보여요 🌧️ 우리 아이 이야기를 자유롭게 남겨주세요</footer>

<input type="file" id="fileInput" accept="image/*" style="display:none">

<script>
/* ============ Firebase Realtime Database (REST, SDK 없이) ============ */
const DB_URL = "https://quiz-73a03-default-rtdb.firebaseio.com"; // 기존 프로젝트
const PATH = "rainyday"; // 이 활동 전용 경로

let state = { title:"", cards:{} };
let cardElements = {};
let activeUploadId = null;
let esRetryTimer = null;
let hasSeeded = false;

const grid = document.getElementById('grid');
const addCardEl = document.createElement('div');
addCardEl.className = 'add-card';
addCardEl.onclick = addCard;
addCardEl.innerHTML = `<div><span class="icon">＋</span>사진 추가하기</div>`;

const titleInput = document.getElementById('mainTitle');
titleInput.addEventListener('input', debounce(()=>{
  writePath('title', titleInput.value);
}, 500));

function setStatus(kind, text){
  const dot = document.getElementById('statusDot');
  dot.className = 'status-dot ' + (kind || '');
  document.getElementById('statusText').textContent = text;
}
function showBanner(msg){
  const b = document.getElementById('banner');
  b.textContent = msg;
  b.style.display = 'block';
}

function debounce(fn, delay){
  let t;
  return (...args)=>{ clearTimeout(t); t = setTimeout(()=>fn(...args), delay); };
}

/* ---------- 쓰기 ---------- */
function writePath(path, value, method){
  return fetch(`${DB_URL}/${PATH}/${path}.json`, {
    method: method || 'PUT',
    body: value === undefined ? null : JSON.stringify(value)
  }).then(res=>{
    if(!res.ok){
      return res.json().catch(()=>({})).then(err=>{
        throw new Error(err.error || ('HTTP ' + res.status));
      });
    }
    return res;
  }).catch(err=>{
    console.error('저장 실패', err);
    showBanner('⚠️ 저장에 실패했어요. Firebase 규칙에서 "' + PATH + '" 경로 읽기/쓰기가 허용되어 있는지 확인해주세요.');
  });
}

/* ---------- 실시간 수신 ---------- */
function connect(){
  setStatus('', '연결 중...');
  const es = new EventSource(`${DB_URL}/${PATH}.json`);

  es.addEventListener('put', e => handleEvent(e, false));
  es.addEventListener('patch', e => handleEvent(e, true));

  es.onopen = () => setStatus('online', '가정과 실시간 연결됨');
  es.onerror = () => {
    setStatus('error', '연결 끊김 - 재시도 중...');
    es.close();
    clearTimeout(esRetryTimer);
    esRetryTimer = setTimeout(connect, 3000);
  };
}

function handleEvent(e, isPatch){
  try{
    let payload;
    try{ payload = JSON.parse(e.data); } catch(err){ return; }
    const path = payload.path;   // 예: "/", "/title", "/cards/xyz"
    const data = payload.data;

    const parts = path.split('/').filter(Boolean);

    if(parts.length === 0){
      // 루트
      if(isPatch && data && typeof data === 'object'){
        state.title = ('title' in data) ? data.title : state.title;
        state.cards = ('cards' in data) ? (data.cards || {}) : state.cards;
      } else {
        state = data || { title:"", cards:{} };
        if(!state.cards) state.cards = {};
      }
      fullRender();

      if(!hasSeeded){
        hasSeeded = true;
        if(!state.title){
          writePath('title', '우리가 발견한 비온 날');
        }
        if(Object.keys(state.cards).length === 0){
          for(let i=0;i<6;i++) addCard();
        }
      }
      return;
    }

    if(parts[0] === 'title'){
      state.title = data;
      updateTitleUI();
      return;
    }

    if(parts[0] === 'cards'){
      if(parts.length === 1){
        state.cards = data || {};
        syncCardsUI();
        return;
      }
      const id = parts[1];
      if(parts.length === 2){
        if(data === null){ delete state.cards[id]; }
        else { state.cards[id] = data; }
      } else {
        const field = parts[2];
        state.cards[id] = state.cards[id] || {};
        if(data === null){ delete state.cards[id][field]; }
        else { state.cards[id][field] = data; }
      }
      syncCardsUI();
    }
  } catch(err){
    console.error('데이터 처리 중 오류', err);
    showBanner('⚠️ 일부 데이터를 불러오는 중 문제가 있었어요. 새로고침해도 계속되면 알려주세요. (오류: ' + err.message + ')');
    try{ syncCardsUI(); }catch(e2){}
  }
}

/* ---------- 렌더링 ---------- */
function autoGrow(el){
  // 늘어날 때만 반응(줄어들 때는 포커스 벗어날 때 처리) → 화면 흔들림 방지
  if(el.scrollHeight > el.clientHeight){
    el.style.height = el.scrollHeight + 'px';
  }
}
function shrinkToFit(el){
  el.style.height = 'auto';
  el.style.height = el.scrollHeight + 'px';
}

function fullRender(){
  updateTitleUI();
  syncCardsUI();
}

function updateTitleUI(){
  if(document.activeElement !== titleInput){
    titleInput.value = state.title || '우리가 발견한 비온 날';
  }
}

function syncCardsUI(){
  const cardsObj = state.cards || {};
  const remoteIds = Object.keys(cardsObj).filter(id => cardsObj[id] && typeof cardsObj[id] === 'object');

  // 삭제된 카드 제거
  Object.keys(cardElements).forEach(id=>{
    if(!cardsObj[id]){
      cardElements[id].remove();
      delete cardElements[id];
    }
  });

  // 추가/업데이트 (등록 순서 정렬: ts 기준)
  remoteIds.sort((a,b)=> ((cardsObj[a]&&cardsObj[a].ts)||0) - ((cardsObj[b]&&cardsObj[b].ts)||0));
  remoteIds.forEach(id=>{
    const data = cardsObj[id];
    try{
      if(!cardElements[id]){
        cardElements[id] = buildCardElement(id, data);
      } else {
        updateCardElement(cardElements[id], data);
      }
      grid.insertBefore(cardElements[id], addCardEl);
    }catch(err){
      console.error('카드 렌더링 오류', id, err);
    }
  });

  if(!grid.contains(addCardEl)) grid.appendChild(addCardEl);
  else grid.appendChild(addCardEl); // 항상 맨 끝에 위치
}

function buildCardElement(id, data){
  const el = document.createElement('div');
  el.className = 'card';
  el.dataset.id = id;

  el.innerHTML = `
    <button class="remove-btn" title="삭제">✕</button>
    <input class="name-input" placeholder="누구 이야기인가요? (선택)">
    <div class="photo-slot">
      <div class="hint"><span class="icon">☂️</span>사진을 클릭해서<br>업로드하세요</div>
    </div>
    <input class="cap-input" placeholder="사진 제목을 입력하세요">
    <div class="bubble-wrap">
      <textarea class="bubble" placeholder="아이가 뭐라고 했나요? 💬"></textarea>
    </div>
  `;

  el.querySelector('.remove-btn').onclick = ()=> writePath(`cards/${id}`, null);
  el.querySelector('.photo-slot').onclick = ()=> openUpload(id);

  const nameInput = el.querySelector('.name-input');
  nameInput.addEventListener('input', debounce(()=> writePath(`cards/${id}/name`, nameInput.value), 500));

  const capInput = el.querySelector('.cap-input');
  capInput.addEventListener('input', debounce(()=> writePath(`cards/${id}/caption`, capInput.value), 500));

  const bubble = el.querySelector('.bubble');
  bubble.addEventListener('input', debounce(()=> writePath(`cards/${id}/speech`, bubble.value), 500));
  bubble.addEventListener('input', ()=> autoGrow(bubble));
  bubble.addEventListener('blur', ()=> shrinkToFit(bubble));

  updateCardElement(el, data);
  return el;
}

function updateCardElement(el, data){
  data = data || {};
  const photoSlot = el.querySelector('.photo-slot');
  if(data.img){
    if(photoSlot.dataset.img !== data.img){
      photoSlot.dataset.img = data.img;
      photoSlot.innerHTML = `<img src="${data.img}" alt="사진"><span class="replace-badge">사진 교체</span>`;
    }
  } else if(photoSlot.dataset.img){
    photoSlot.dataset.img = '';
    photoSlot.innerHTML = `<div class="hint"><span class="icon">☂️</span>사진을 클릭해서<br>업로드하세요</div>`;
  }

  const nameInput = el.querySelector('.name-input');
  if(document.activeElement !== nameInput) nameInput.value = data.name || '';

  const capInput = el.querySelector('.cap-input');
  if(document.activeElement !== capInput) capInput.value = data.caption || '';

  const bubble = el.querySelector('.bubble');
  if(document.activeElement !== bubble){
    bubble.value = data.speech || '';
  }
  shrinkToFit(bubble);
}

/* ---------- 카드 추가/사진 업로드 ---------- */
function addCard(){
  const id = 'c' + Date.now() + Math.random().toString(36).slice(2,8);
  writePath(`cards/${id}`, { caption:'', speech:'', name:'', img:null, ts: Date.now() });
}

function openUpload(id){
  activeUploadId = id;
  document.getElementById('fileInput').click();
}

document.getElementById('fileInput').addEventListener('change', function(e){
  const file = e.target.files[0];
  if(!file || !activeUploadId) return;
  const id = activeUploadId;

  const img = new Image();
  const reader = new FileReader();
  reader.onload = ev => { img.src = ev.target.result; };
  img.onload = () => {
    const maxSize = 640;
    let w = img.width, h = img.height;
    if(w > h && w > maxSize){ h = h * (maxSize / w); w = maxSize; }
    else if(h > maxSize){ w = w * (maxSize / h); h = maxSize; }
    const canvas = document.createElement('canvas');
    canvas.width = w; canvas.height = h;
    canvas.getContext('2d').drawImage(img, 0, 0, w, h);
    const dataUrl = canvas.toDataURL('image/jpeg', 0.65);
    writePath(`cards/${id}/img`, dataUrl);
  };
  reader.readAsDataURL(file);
  e.target.value = '';
});

/* ---------- 초기 연결 상태 점검 후 시작 ---------- */
/* ---------- 오프라인 폴백 (연결 실패 시에도 양식은 보이도록) ---------- */
function renderOfflineBlanks(){
  if(!titleInput.value) titleInput.value = '우리가 발견한 비온 날';
  grid.innerHTML = '';
  for(let i=1;i<=6;i++){
    const id = 'offline' + i;
    const el = buildCardElement(id, { caption:'', speech:'', name:'', img:null });
    // 오프라인 상태에서는 저장 시도 대신 안내만
    el.querySelectorAll('input,textarea').forEach(inp=>{
      inp.addEventListener('focus', ()=>{
        showBanner('⚠️ 아직 서버에 연결되지 않아 이 내용은 저장되지 않아요. 인터넷 연결과 페이지 주소(https://로 시작하는지)를 확인해주세요.');
      }, { once:true });
    });
    grid.insertBefore(el, addCardEl);
  }
  grid.appendChild(addCardEl);
}

fetch(`${DB_URL}/${PATH}.json`)
  .then(res=>{
    if(!res.ok){
      return res.json().catch(()=>({})).then(err=>{ throw new Error(err.error || ('HTTP '+res.status)); });
    }
    connect();
  })
  .catch(err=>{
    setStatus('error', '연결 실패');
    showBanner('⚠️ Firebase에 연결할 수 없어요 (' + err.message + '). 이 파일이 https:// 주소로 열려있는지, 인터넷 연결이 되는지 확인해주세요.');
    renderOfflineBlanks();
    // 백그라운드에서 계속 재연결 시도
    setTimeout(connect, 4000);
  });
</script>
</body>
</html>
